// ---------- GAME LOGIC (same as before, fully included) ----------

let league=teams;
let userTeam=null;
let schedule=[];
let history=[];
let selectedPlayerIndex=null;

// schedule
for(let i=0;i<league.length;i++){
  for(let j=i+1;j<league.length;j++){
    schedule.push({home:league[i],away:league[j],played:false});
  }
}
schedule.sort(()=>Math.random()-0.5);

function teamRating(t){
  return t.players.reduce((a,b)=>a+b.rating,0)/t.players.length;
}

// UI
function showTeams(){
  output.innerHTML=league.map(t=>`
  <div class="card" onclick="selectTeam('${t.name}')">
    <img src="${t.logo}">
    <div>${t.name}</div>
  </div>`).join("");
}

function selectTeam(name){
  userTeam=league.find(t=>t.name===name);
  teamName.innerText=name;
}

function viewRoster(){
  output.innerHTML=userTeam.players.map(p=>`
  <div class="card">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div class="rating">${p.rating}</div>
  </div>`).join("");
}

// GAME
function nextGame(){
  let g=schedule.find(x=>!x.played && (x.home===userTeam||x.away===userTeam));
  if(!g){output.innerHTML="Season done";return;}

  let sA=Math.floor(teamRating(g.home)+Math.random()*20);
  let sB=Math.floor(teamRating(g.away)+Math.random()*20);

  g.played=true;

  history.push(`${g.home.name} ${sA}-${sB} ${g.away.name}`);

  output.innerHTML=`<h2>${g.home.name} ${sA} - ${sB} ${g.away.name}</h2>`;
}

// standings
function showStandings(){
  output.innerHTML=league.map(t=>`
  <div class="card">${t.name}</div>`).join("");
}

// history
function showHistory(){
  output.innerHTML=history.map(g=>`<div class="card">${g}</div>`).join("");
}

// save/load
function saveGame(){
  localStorage.setItem("save",JSON.stringify({league,history,schedule}));
}
function loadGame(){
  let d=JSON.parse(localStorage.getItem("save"));
  if(d){league=d.league;history=d.history;schedule=d.schedule;}
}
