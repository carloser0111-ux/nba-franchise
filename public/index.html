<!DOCTYPE html>
<html>
<head>
  <title>NBA MyLEAGUE</title>
  <style>
    body {
      background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1 { color: gold; }

    .menu button {
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:gold;
      font-weight:bold;
      cursor:pointer;
    }

    .grid {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:15px;
      margin-top:20px;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      width:150px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(255,215,0,0.3);
      cursor:pointer;
    }

    .card:hover { transform:scale(1.05); }

    img { width:80px; border-radius:8px; }

    .rating { color:gold; font-weight:bold; }
  </style>
</head>
<body>

<h1>🏀 NBA MyLEAGUE</h1>

<div class="menu">
  <button onclick="showTeams()">Teams</button>
  <button onclick="viewRoster()">Roster</button>
  <button onclick="showStandings()">Standings</button>
  <button onclick="showPlayoffs()">Playoffs</button>
  <button onclick="tradeMenu()">Trade</button>
  <button onclick="simSeason()">Sim Season</button>
</div>

<h2 id="teamName"></h2>
<h3 id="record"></h3>

<div id="output"></div>

<script>

// --- TEAMS (sample but expandable) ---
let teams = [
{
name:"Lakers",
logo:"https://cdn.nba.com/logos/nba/1610612747/global/L/logo.svg",
players:[
{name:"LeBron James",rating:96,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/2544.png"},
{name:"Anthony Davis",rating:92,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/203076.png"},
{name:"Austin Reaves",rating:86,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1630559.png"},
{name:"Rui Hachimura",rating:82,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1629060.png"},
{name:"D'Angelo Russell",rating:84,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1626156.png"}
]
},
{
name:"Warriors",
logo:"https://cdn.nba.com/logos/nba/1610612744/global/L/logo.svg",
players:[
{name:"Stephen Curry",rating:97,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/201939.png"},
{name:"Klay Thompson",rating:86,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/202691.png"},
{name:"Draymond Green",rating:85,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/203110.png"},
{name:"Andrew Wiggins",rating:83,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/203952.png"},
{name:"Jonathan Kuminga",rating:84,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1630228.png"}
]
},
{
name:"Celtics",
logo:"https://cdn.nba.com/logos/nba/1610612738/global/L/logo.svg",
players:[
{name:"Jayson Tatum",rating:97,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1628369.png"},
{name:"Jaylen Brown",rating:95,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1627759.png"},
{name:"Kristaps Porzingis",rating:88,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/204001.png"},
{name:"Jrue Holiday",rating:87,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/201950.png"},
{name:"Derrick White",rating:86,img:"https://cdn.nba.com/headshots/nba/latest/1040x760/1628401.png"}
]
}
];

let league = teams;
let userTeam = null;
let selectedPlayerIndex = null;

// --- TEAM SELECT ---
function showTeams(){
  let html="<div class='grid'>";
  league.forEach(t=>{
    html+=`
    <div class="card" onclick="selectTeam('${t.name}')">
      <img src="${t.logo}">
      <div>${t.name}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

function selectTeam(name){
  userTeam = league.find(t=>t.name===name);
  updateUI();
}

// --- UI ---
function updateUI(){
  if(!userTeam) return;
  teamName.innerHTML=`<img src="${userTeam.logo}"> ${userTeam.name}`;
  record.innerText=(userTeam.wins||0)+"-"+(userTeam.losses||0);
}

// --- ROSTER ---
function viewRoster(){
  if(!userTeam) return;
  let html="<div class='grid'>";
  userTeam.players.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div>${p.name}</div>
      <div class="rating">${p.rating}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

// --- SIM ---
function teamRating(team){
  return team.players.reduce((a,b)=>a+b.rating,0)/team.players.length;
}

function simSeason(){
  league.forEach(t=>{t.wins=0;t.losses=0;});
  for(let i=0;i<50;i++){
    league.forEach(team=>{
      let opp=league[Math.floor(Math.random()*league.length)];
      if(opp===team) return;
      if(teamRating(team)+Math.random()*10 > teamRating(opp)+Math.random()*10){
        team.wins++;
      } else team.losses++;
    });
  }
  alert("Season done!");
  showStandings();
}

// --- STANDINGS ---
function showStandings(){
  let sorted=[...league].sort((a,b)=>(b.wins||0)-(a.wins||0));
  let html="<div class='grid'>";
  sorted.forEach(t=>{
    html+=`
    <div class="card">
      <img src="${t.logo}">
      <div>${t.name}</div>
      <div>${t.wins||0}-${t.losses||0}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

// --- PLAYOFFS ---
function showPlayoffs(){
  let sorted=[...league].sort((a,b)=>(b.wins||0)-(a.wins||0)).slice(0,8);
  let html="<div class='grid'>";
  sorted.forEach(t=>{
    html+=`
    <div class="card">
      <img src="${t.logo}">
      <div>${t.name}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

// --- TRADES ---
function tradeMenu(){
  if(!userTeam) return;
  let html="<div class='grid'>";
  userTeam.players.forEach((p,i)=>{
    html+=`
    <div class="card" onclick="selectTradePlayer(${i})">
      <img src="${p.img}">
      <div>${p.name}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

function selectTradePlayer(i){
  selectedPlayerIndex=i;
  let html="<div class='grid'>";
  league.forEach(t=>{
    if(t!==userTeam){
      html+=`
      <div class="card" onclick="selectTradeTeam('${t.name}')">
        <img src="${t.logo}">
        <div>${t.name}</div>
      </div>`;
    }
  });
  html+="</div>";
  output.innerHTML=html;
}

function selectTradeTeam(name){
  let t=league.find(x=>x.name===name);
  let html="<div class='grid'>";
  t.players.forEach((p,i)=>{
    html+=`
    <div class="card" onclick="makeTrade('${name}',${i})">
      <img src="${p.img}">
      <div>${p.name}</div>
    </div>`;
  });
  html+="</div>";
  output.innerHTML=html;
}

function makeTrade(name,i){
  let t=league.find(x=>x.name===name);
  let my=userTeam.players[selectedPlayerIndex];
  let their=t.players[i];

  if(their.rating > my.rating+3){
    alert("Trade rejected");
    return;
  }

  userTeam.players[selectedPlayerIndex]=their;
  t.players[i]=my;

  alert("Trade accepted");
  viewRoster();
}

</script>

</body>
</html>
