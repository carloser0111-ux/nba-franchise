<!DOCTYPE html>
<html>
<head>
  <title>NBA MyLEAGUE</title>
  <style>
    body { background:#111; color:white; font-family:Arial; text-align:center; }
    h1 { color:gold; }

    .menu button {
      padding:10px; margin:5px; border:none;
      border-radius:8px; background:gold;
      cursor:pointer; font-weight:bold;
    }

    .grid {
      display:flex; flex-wrap:wrap;
      justify-content:center; gap:15px;
      margin-top:20px;
    }

    .card {
      background:#1c1c1c; padding:10px;
      width:160px; border-radius:10px;
    }

    img { width:80px; border-radius:8px; }
    .rating { color:gold; }
  </style>
</head>
<body>

<h1>🏀 NBA MyLEAGUE</h1>

<div class="menu">
  <button onclick="showTeams()">Teams</button>
  <button onclick="viewRoster()">Roster</button>
  <button onclick="showStandings()">Standings</button>
  <button onclick="showPlayoffs()">Playoffs</button>
  <button onclick="tradeMenu()">Trade</button>
  <button onclick="showNextGame()">Next Game</button>
  <button onclick="showHistory()">Game Log</button>
  <button onclick="saveGame()">Save</button>
  <button onclick="loadGame()">Load</button>
</div>

<h2 id="teamName"></h2>
<h3 id="record"></h3>
<div id="output"></div>

<script>

// --- TEAMS ---
let teamNames = ["Lakers","Warriors","Celtics","Bucks","Suns","Nuggets","Mavericks","Heat"];

let stars = [
{ name:"LeBron James", rating:96 },
{ name:"Stephen Curry", rating:97 },
{ name:"Jayson Tatum", rating:97 },
{ name:"Giannis Antetokounmpo", rating:98 },
{ name:"Kevin Durant", rating:97 },
{ name:"Nikola Jokic", rating:99 }
];

function genPlayer(){
  return {
    name:"Role Player",
    rating: Math.floor(Math.random()*10)+78,
    stats:{ ppg:10, rpg:5, apg:3 }
  };
}

let league = teamNames.map((name,i)=>{
  let players=[];
  players.push({...stars[i%stars.length], stats:{ppg:28,rpg:8,apg:7}});
  players.push({...stars[(i+1)%stars.length], stats:{ppg:24,rpg:6,apg:5}});
  while(players.length<5) players.push(genPlayer());

  return { name, players, wins:0, losses:0 };
});

let userTeam=null;
let selectedPlayerIndex=null;
let currentGame=null;
let history=[];

// --- UI ---
function showTeams(){
  output.innerHTML = league.map(t=>
    `<div class="card" onclick="selectTeam('${t.name}')">${t.name}</div>`
  ).join("");
}

function selectTeam(name){
  userTeam = league.find(t=>t.name===name);
  updateUI();
}

function updateUI(){
  if(!userTeam) return;
  teamName.innerText=userTeam.name;
  record.innerText=userTeam.wins+"-"+userTeam.losses;
}

// --- ROSTER ---
function viewRoster(){
  if(!userTeam) return;
  output.innerHTML = userTeam.players.map(p=>`
    <div class="card">
      <div>${p.name}</div>
      <div class="rating">${p.rating}</div>
      <div>${p.stats.ppg} PPG</div>
    </div>
  `).join("");
}

// --- STANDINGS ---
function showStandings(){
  let sorted=[...league].sort((a,b)=>b.wins-a.wins);
  output.innerHTML = sorted.map(t=>
    `<div class="card">${t.name}<br>${t.wins}-${t.losses}</div>`
  ).join("");
}

// --- PLAYOFFS ---
function showPlayoffs(){
  let top=[...league].sort((a,b)=>b.wins-a.wins).slice(0,4);
  output.innerHTML = top.map(t=>`<div class="card">${t.name}</div>`).join("");
}

// --- NEXT GAME ---
function showNextGame(){
  let opp = league[Math.floor(Math.random()*league.length)];
  if(opp===userTeam) return showNextGame();

  currentGame={home:userTeam,away:opp};

  output.innerHTML=`
    <h2>${userTeam.name} vs ${opp.name}</h2>
    <button onclick="playGame()">Play</button>
  `;
}

// --- GAME SIM ---
function teamRating(t){
  return t.players.reduce((a,b)=>a+b.rating,0)/t.players.length;
}

function playGame(){
  let a=currentGame.home;
  let b=currentGame.away;

  let sA=Math.floor(teamRating(a)+Math.random()*20);
  let sB=Math.floor(teamRating(b)+Math.random()*20);

  if(sA>sB){a.wins++;b.losses++;} else {b.wins++;a.losses++;}

  let game={
    a:a.name,b:b.name,sA,sB
  };

  history.push(game);

  output.innerHTML=`
    <h2>${a.name} ${sA} - ${sB} ${b.name}</h2>
  `;

  updateUI();
}

// --- HISTORY ---
function showHistory(){
  output.innerHTML = history.map(g=>
    `<div class="card">${g.a} ${g.sA} - ${g.sB} ${g.b}</div>`
  ).join("");
}

// --- TRADES ---
function tradeMenu(){
  output.innerHTML = userTeam.players.map((p,i)=>
    `<div class="card" onclick="selectTradePlayer(${i})">${p.name}</div>`
  ).join("");
}

function selectTradePlayer(i){
  selectedPlayerIndex=i;
  output.innerHTML = league.map(t=>{
    if(t!==userTeam)
      return `<div class="card" onclick="selectTradeTeam('${t.name}')">${t.name}</div>`;
  }).join("");
}

function selectTradeTeam(name){
  let t=league.find(x=>x.name===name);
  output.innerHTML = t.players.map((p,i)=>
    `<div class="card" onclick="makeTrade('${name}',${i})">${p.name}</div>`
  ).join("");
}

function makeTrade(name,i){
  let t=league.find(x=>x.name===name);
  let my=userTeam.players[selectedPlayerIndex];
  let their=t.players[i];

  if(their.rating>my.rating+3){
    alert("Trade rejected");
    return;
  }

  userTeam.players[selectedPlayerIndex]=their;
  t.players[i]=my;

  alert("Trade done");
}

// --- SAVE / LOAD ---
function saveGame(){
  localStorage.setItem("league",JSON.stringify(league));
  alert("Saved!");
}

function loadGame(){
  let data=localStorage.getItem("league");
  if(data){
    league=JSON.parse(data);
    alert("Loaded!");
  }
}

</script>

</body>
</html>
