<!DOCTYPE html>
<html>
<head>
  <title>MyLEAGUE</title>
  <style>
    body { background:#0b0b0b; color:white; font-family:Arial; text-align:center; }
    h1 { color: gold; }

    .card {
      background:#1c1c1c;
      padding:10px;
      margin:8px;
      border-radius:10px;
      display:inline-block;
      width:180px;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      background:gold;
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h1>🏀 MyLEAGUE</h1>

<div id="menu">
  <button onclick="startLeague()">Start League</button>
  <button onclick="loadGame()">Load Save</button>
</div>

<div id="game" style="display:none;">
  <h2 id="teamName"></h2>
  <h3 id="record"></h3>

  <button onclick="simGame()">Sim Game</button>
  <button onclick="simSeason()">Sim Season</button>
  <button onclick="viewStandings()">Standings</button>
  <button onclick="viewRoster()">Roster</button>
  <button onclick="tradeMenu()">Trade</button>
  <button onclick="saveGame()">Save</button>

  <h2 id="result"></h2>
  <div id="output"></div>
</div>

<script>
// ---------- GENERATION ----------
const first = ["Jay","Chris","Mike","Devin","Tyrese","Jalen","Zion"];
const last = ["Smith","Brown","Davis","Wilson","Moore"];

function randomPlayer() {
  return {
    name: first[Math.floor(Math.random()*first.length)]+" "+last[Math.floor(Math.random()*last.length)],
    rating: Math.floor(Math.random()*25)+75,
    age: Math.floor(Math.random()*10)+20,
    ppg: 0
  };
}

function createTeam(name) {
  let players=[];
  for(let i=0;i<5;i++) players.push(randomPlayer());

  return { name, players, wins:0, losses:0 };
}

// ---------- STATE ----------
let league=[];
let userTeam=null;

// ---------- START ----------
function startLeague() {
  league=[
    createTeam("Lakers"),
    createTeam("Celtics"),
    createTeam("Heat"),
    createTeam("Spurs"),
    createTeam("Knicks"),
    createTeam("Warriors"),
    createTeam("Bucks"),
    createTeam("Mavericks")
  ];

  userTeam=league[0];

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  updateUI();
}

// ---------- SIM ----------
function teamRating(team){
  return team.players.reduce((a,b)=>a+b.rating,0)/team.players.length;
}

function playGame(a,b){
  let scoreA=teamRating(a)+Math.random()*15;
  let scoreB=teamRating(b)+Math.random()*15;

  a.players.forEach(p=>p.ppg+=(Math.random()*10));
  b.players.forEach(p=>p.ppg+=(Math.random()*10));

  if(scoreA>scoreB){ a.wins++; b.losses++; }
  else { b.wins++; a.losses++; }
}

function simGame(){
  let opp=league[Math.floor(Math.random()*league.length)];
  if(opp===userTeam) return simGame();

  playGame(userTeam,opp);
  progression();
  updateUI();
}

function simSeason(){
  for(let i=0;i<20;i++){
    league.forEach(t=>{
      let opp=league[Math.floor(Math.random()*league.length)];
      if(t!==opp) playGame(t,opp);
    });
  }

  playoffs();
  draft();
  progression();
  updateUI();
}

// ---------- PLAYOFFS ----------
function playoffs(){
  let sorted=[...league].sort((a,b)=>b.wins-a.wins);
  let top=sorted.slice(0,4);

  let champ=top[Math.floor(Math.random()*top.length)];
  document.getElementById("result").innerText="🏆 Champion: "+champ.name;
}

// ---------- DRAFT ----------
function draft(){
  league.forEach(team=>{
    team.players.push(randomPlayer());
    team.players.shift();
  });
}

// ---------- PROGRESSION ----------
function progression(){
  league.forEach(team=>{
    team.players.forEach(p=>{
      p.age++;

      if(p.age<26 && Math.random()<0.4) p.rating++;
      if(p.age>30 && Math.random()<0.3) p.rating--;

      if(p.rating>99) p.rating=99;
      if(p.rating<70) p.rating=70;
    });
  });
}

// ---------- UI ----------
function updateUI(){
  document.getElementById("teamName").innerText=userTeam.name;
  document.getElementById("record").innerText=userTeam.wins+"-"+userTeam.losses;
}

function viewStandings(){
  let sorted=[...league].sort((a,b)=>b.wins-a.wins);
  let out="<h2>Standings</h2>";

  sorted.forEach(t=>{
    out+=t.name+" "+t.wins+"-"+t.losses+"<br>";
  });

  document.getElementById("output").innerHTML=out;
}

function viewRoster(){
  let out="<h2>Roster</h2>";

  userTeam.players.forEach(p=>{
    out+=`${p.name} | OVR:${p.rating} | Age:${p.age} | PPG:${p.ppg.toFixed(1)}<br>`;
  });

  document.getElementById("output").innerHTML=out;
}

// ---------- TRADE ----------
function tradeMenu(){
  let other=league[Math.floor(Math.random()*league.length)];
  if(other===userTeam) return tradeMenu();

  let incoming=other.players[0];
  let outgoing=userTeam.players[0];

  userTeam.players[0]=incoming;
  other.players[0]=outgoing;

  document.getElementById("result").innerText="Trade completed";
}

// ---------- SAVE ----------
function saveGame(){
  localStorage.setItem("league",JSON.stringify(league));
  localStorage.setItem("teamIndex",league.indexOf(userTeam));
  alert("Saved!");
}

function loadGame(){
  let saved=localStorage.getItem("league");
  if(!saved) return alert("No save");

  league=JSON.parse(saved);
  let idx=localStorage.getItem("teamIndex");

  userTeam=league[idx];

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  updateUI();
}
</script>

</body>
</html>
